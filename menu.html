<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PASAJEROS A MONTERO</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/menu.css" />
  </head>
  <body>
    <header id="menu">
      <img src="img/logoX.png" alt="Logo" class="logo-izquierda" />

      <div class="botones-derecha-nav">
        <button onclick="goMenu()">Menu</button>
        <button onclick="goFlotas()">Flota</button>
        <button onclick="goViajes()">Viajes</button>
      </div>
      <div style="clear: both"></div>
    </header>
    <main>
      <h1>MENU</h1>
      <div  class="main-menu">
        <div>

          <div class="header_din">
            <h2>PLACA</h2>
            <h2>CHOFER</h2>
            <h2>DESTINO</h2>
          </div>
          <div id="dinamic"></div>
        </div>
        <div id="btns" class="filtro-fecha">
          <label>Fecha:</label>
          <divc id="contenedor-fechas"></div>
          <button id="buscar">Buscar</button>
        </div>
      </div>
    </main>

    <script src="js/menu.js"></script>
    <script src="js/components/componente_fecha.js"></script>

    <script>
      window.onload = function () {
        SelectorFecha.renderizar("contenedor-fechas");

        document.getElementById("buscar").onclick = function () {
          var fechaLista = SelectorFecha.obtenerFechaFormateada();
          alert("La fecha seleccionada es: " + fechaLista);
        };
      };
    </script>
  </body>
</html>
